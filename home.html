<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker-Home</title>

    <link rel="stylesheet" href="./style.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#f2f7fc]">
    <header>
      <nav
        class="navbar mx-auto bg-white shadow-sm flex justify-between items-center py-8 px-12"
      >
        <div class="nav-left">
          <a href="#" class="nav-logo flex items-center gap-2">
            <img class="max-w-[36px]" src="./assets/github-logo.png" alt="" />
            <span class="font-semibold text-2xl">GitHub Issues Tracker</span>
          </a>
        </div>

        <div class="nav-right">
          <div class="search flex gap-2">
            <div class="">
              <label class="input validator">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input
                  class="w-full font-medium"
                  id="input-search"
                  type="text"
                  placeholder="Search Issues"
                  required
                />
              </label>
            </div>
            <button id="btn-search" class="btn btn-primary text-lg font-medium">
              + New Issue
            </button>
          </div>
        </div>
      </nav>
    </header>

    <section
      id="navigation"
      class="container mx-auto flex gap-2 bg-white p-4 mt-[60px] mb-6 rounded-lg"
    >
      <button
        id="all-btn"
        class="navigation-btn active btn text-[16px] font-medium w-[100px]"
      >
        All
      </button>
      <button
        id="open-btn"
        class="navigation-btn btn text-[16px] font-medium w-[100px]"
      >
        Open
      </button>
      <button
        id="closed-btn"
        class="navigation-btn btn text-[16px] font-medium w-[100px]"
      >
        Closed
      </button>
    </section>

    <section id="All-issues" class="container mx-auto bg-[#F8FAFC] rounded-lg">
      <header class="bg-white p-4 rounded-lg flex justify-between items-center">
        <div class="left flex items-center gap-2">
          <img
            class="bg-slate-200 rounded-full p-2"
            src="./assets/Aperture.png"
            alt=""
          />
          <div class="text">
            <h2 class="text-lg font-medium text-[#1F2937]">50 Issues</h2>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="right flex gap-2">
          <p>
            <i class="fa-solid fa-circle text-green-500"></i> <span>Open</span>
          </p>
          <p>
            <i class="fa-solid fa-circle text-red-500"></i> <span>Closed</span>
          </p>
        </div>
      </header>

      <!-- card div -->
      <div
        id="card-container"
        class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
      ></div>
    </section>

    <dialog id="issue_modal" class="modal shadow-lg">
      <div class="modal-box">
        <div id="details-container">
          <!-- Issue Details -->
          <div class="word-detail">
            <h2 class="text-xl font-semibold mb-2">Fix broken image uploads</h2>

            <div class="status space-y-1">
              <button class="bg-gray-200 px-3 py-1 rounded">Opened</button>
              <p>Opened By: <span class="font-medium">John Doe</span></p>
              <p>Opened On: <span class="font-medium">2023-01-01</span></p>
            </div>
          </div>

          <!-- Labels -->
          <div class="flex gap-2 mt-4">
            <button
              class="text-red-500 bg-red-100 py-1 px-4 rounded-full font-medium flex items-center gap-2"
            >
              <i class="fa-solid fa-bug"></i>
              <span>BUG</span>
            </button>

            <button
              class="text-[#D97706] bg-[#D97706]/20 py-1 px-4 rounded-full font-medium flex items-center gap-2"
            >
              <i class="fa-regular fa-life-ring"></i>
              <span>HELP WANTED</span>
            </button>
          </div>
        </div>
      </div>
    </dialog>

    <section class="container mx-auto">
      <div id="details-container" class="w-1/2 mx-auto"></div>
    </section>

    <script src="./script/handler.js"></script>
  </body>
</html>
